apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-and-approve-app
  namespace: cicd
spec:
  params:
    - name: repo-url
      type: string
    - name: app-name
      type: string
    - name: app-path
      type: string
    - name: version
      type: string
    - name: description
      type: string
    - name: port
      type: string
      default: "8080"

  workspaces:
    - name: shared-workspace

  tasks:
    - name: clone-repo
      taskSpec:
        params:
          - name: repo-url
        workspaces:
          - name: output
        steps:
          - name: clone
            image: alpine/git
            script: |
              #!/bin/sh
              set -e
              rm -rf $(workspaces.output.path)/source
              git clone $(params.repo-url) $(workspaces.output.path)/source
      params:
        - name: repo-url
          value: $(params.repo-url)
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: build-and-push
      runAfter:
        - clone-repo
      taskSpec:
        params:
          - name: app-name
          - name: app-path
          - name: version
        workspaces:
          - name: source
        steps:
          - name: build
            image: quay.io/buildah/stable
            securityContext:
              privileged: true
            workingDir: $(workspaces.source.path)/source/$(params.app-path)
            script: |
              #!/bin/sh
              set -e
              IMAGE="image-registry.openshift-image-registry.svc:5000/app-dev/$(params.app-name):$(params.version)"
              buildah bud -t "$IMAGE" .
              buildah push --tls-verify=false "$IMAGE"
      params:
        - name: app-name
          value: $(params.app-name)
        - name: app-path
          value: $(params.app-path)
        - name: version
          value: $(params.version)
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: update-approved-apps
      runAfter:
        - build-and-push
      taskSpec:
        params:
          - name: app-name
          - name: version
          - name: description
          - name: port
        workspaces:
          - name: source
        steps:
          - name: update-gitops
            image: quay.io/fedora/fedora:latest
            workingDir: $(workspaces.source.path)/source
            env:
              - name: GITHUB_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: github-token
                    key: username
              - name: GITHUB_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: github-token
                    key: token
            script: |
              #!/bin/bash
              set -e

              dnf install -y git python3 python3-pip
              pip3 install pyyaml

              git config --global user.name "OpenShift Pipeline"
              git config --global user.email "pipeline@openshift.local"

              IMAGE="image-registry.openshift-image-registry.svc:5000/app-dev/$(params.app-name):$(params.version)"
              FILE="gitops/approved-apps.yaml"

              python3 <<PY
              import yaml, json

              file_path = "${FILE}"

              with open(file_path, "r") as f:
                  data = yaml.safe_load(f)

              apps_raw = data.get("data", {}).get("apps.json", "{}")
              apps = json.loads(apps_raw)

              apps["$(params.app-name)"] = {
                  "image": "${IMAGE}",
                  "description": "$(params.description)",
                  "port": int("$(params.port)"),
                  "version": "$(params.version)"
              }

              data["data"]["apps.json"] = json.dumps(apps, indent=2) + "\n"

              with open(file_path, "w") as f:
                  yaml.safe_dump(data, f, sort_keys=False)
              PY

              git add "$FILE"
              git commit -m "Approve $(params.app-name) $(params.version)" || echo "No changes to commit"

              git remote set-url origin https://${GITHUB_USERNAME}:${GITHUB_TOKEN}@github.com/TheMagicalWizardd/demo-app-openshift.git
              git push origin main
      params:
        - name: app-name
          value: $(params.app-name)
        - name: version
          value: $(params.version)
        - name: description
          value: $(params.description)
        - name: port
          value: $(params.port)
      workspaces:
        - name: source
          workspace: shared-workspace
